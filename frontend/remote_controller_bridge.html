<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SST Remote Controller Bridge</title>
    <style>
      :root {
        color-scheme: dark;
        --sst-bg: #080a12;
        --sst-panel: rgba(12, 18, 32, 0.82);
        --sst-panel-strong: rgba(16, 24, 42, 0.95);
        --sst-border: rgba(120, 220, 255, 0.25);
        --sst-text: #eef8ff;
        --sst-muted: #91a4b8;
        --sst-ok: #7cffb2;
        --sst-warning: #ffd166;
        --sst-danger: #ff5c7a;
        --sst-info: #7cc7ff;
        --sst-radius-sm: 8px;
        --sst-radius-md: 14px;
        --sst-radius-lg: 22px;
        --sst-shadow-panel: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background:
          radial-gradient(circle at 16% 12%, rgba(124, 199, 255, 0.18), transparent 30%),
          radial-gradient(circle at 84% 10%, rgba(255, 92, 122, 0.12), transparent 24%),
          linear-gradient(180deg, #0b1422 0%, var(--sst-bg) 100%);
        color: var(--sst-text);
        font-family: "Segoe UI", Tahoma, sans-serif;
      }
      main {
        max-width: 960px;
        margin: 24px auto;
        padding: 0 16px 24px;
      }
      .panel {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent),
          radial-gradient(circle at top right, rgba(124, 199, 255, 0.12), transparent 36%),
          var(--sst-panel-strong);
        border: 1px solid var(--sst-border);
        border-radius: var(--sst-radius-lg);
        padding: 20px;
        box-shadow: var(--sst-shadow-panel);
        backdrop-filter: blur(10px);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      label {
        display: grid;
        gap: 6px;
      }
      input,
      select {
        width: 100%;
        padding: 10px;
        border: 1px solid rgba(120, 220, 255, 0.18);
        border-radius: var(--sst-radius-sm);
        color: var(--sst-text);
        background: #0d1528;
      }
      .actions {
        margin-top: 12px;
        display: flex;
        gap: 10px;
      }
      button {
        padding: 10px 14px;
        border: 1px solid rgba(120, 220, 255, 0.2);
        border-radius: var(--sst-radius-sm);
        color: var(--sst-text);
        background: #1a2745;
        cursor: pointer;
      }
      pre {
        margin: 12px 0 0;
        min-height: 200px;
        max-height: 340px;
        overflow: auto;
        white-space: pre-wrap;
        border: 1px solid rgba(120, 220, 255, 0.12);
        border-radius: 10px;
        padding: 12px;
        background: #0a1122;
        color: #ccd8f7;
      }
      .status {
        margin-top: 10px;
        padding: 10px 12px;
        border: 1px solid rgba(120, 220, 255, 0.12);
        border-radius: var(--sst-radius-md);
        color: var(--sst-muted);
        background: rgba(8, 14, 24, 0.72);
      }
      .status[data-status="ready"] {
        color: var(--sst-info);
        border-color: rgba(124, 199, 255, 0.24);
      }
      .status[data-status="running"] {
        color: var(--sst-ok);
        border-color: rgba(124, 255, 178, 0.28);
      }
      .status[data-status="disabled"] {
        color: var(--sst-muted);
      }
      .status[data-status="loading"],
      .status[data-status="warning"] {
        color: var(--sst-warning);
        border-color: rgba(255, 209, 102, 0.28);
      }
      .status[data-status="error"] {
        color: var(--sst-danger);
        border-color: rgba(255, 92, 122, 0.28);
      }
      @media (max-width: 860px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="panel">
        <h1>Remote Controller Bridge</h1>
        <p class="status">
          Captures local microphone audio and sends it by WebRTC to the remote worker bridge.
        </p>
        <div class="grid">
          <label>
            <span>Worker Base URL</span>
            <input id="worker-url" placeholder="http://192.168.1.50:8765" />
          </label>
          <label>
            <span>Session ID</span>
            <input id="session-id" placeholder="sst-..." />
          </label>
          <label>
            <span>Pair Code</span>
            <input id="pair-code" placeholder="6 digits" />
          </label>
          <label>
            <span>Microphone Input</span>
            <select id="mic-select">
              <option value="">Default microphone</option>
            </select>
          </label>
        </div>
        <div class="actions">
          <button id="connect-btn" type="button">Start Stream</button>
          <button id="stop-btn" type="button">Stop</button>
          <button id="refresh-mics-btn" type="button">Refresh Mics</button>
        </div>
        <p id="status-line" class="status" data-status="ready">Ready.</p>
        <pre id="log-box">controller-bridge: ready</pre>
      </div>
    </main>
    <script src="/static/js/core/redaction.js?v=20260505a"></script>
    <script src="/static/js/remote-controller-bridge.js?v=20260505a"></script>
  </body>
</html>
