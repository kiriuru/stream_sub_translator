<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SST Remote Controller Bridge</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1220;
        --panel: #111a2e;
        --line: #23314f;
        --text: #e9eefc;
        --muted: #95a5c8;
        --ok: #46d39a;
        --warn: #f4b95b;
        --bad: #ef6d6d;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: radial-gradient(circle at top, #1a2a49 0%, var(--bg) 58%);
        color: var(--text);
        font-family: "Segoe UI", Tahoma, sans-serif;
      }
      main {
        max-width: 960px;
        margin: 24px auto;
        padding: 0 16px 24px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      label {
        display: grid;
        gap: 6px;
      }
      input,
      select {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: #0d1528;
      }
      .actions {
        margin-top: 12px;
        display: flex;
        gap: 10px;
      }
      button {
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: #1a2745;
        cursor: pointer;
      }
      pre {
        margin: 12px 0 0;
        min-height: 200px;
        max-height: 340px;
        overflow: auto;
        white-space: pre-wrap;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
        background: #0a1122;
        color: #ccd8f7;
      }
      .status {
        margin-top: 10px;
        color: var(--muted);
      }
      .ok {
        color: var(--ok);
      }
      .warn {
        color: var(--warn);
      }
      .bad {
        color: var(--bad);
      }
      @media (max-width: 860px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="panel">
        <h1>Remote Controller Bridge</h1>
        <p class="status">
          Captures local microphone audio and sends it by WebRTC to the remote worker bridge.
        </p>
        <div class="grid">
          <label>
            <span>Worker Base URL</span>
            <input id="worker-url" placeholder="http://192.168.1.50:8765" />
          </label>
          <label>
            <span>Session ID</span>
            <input id="session-id" placeholder="sst-..." />
          </label>
          <label>
            <span>Pair Code</span>
            <input id="pair-code" placeholder="6 digits" />
          </label>
          <label>
            <span>Microphone Input</span>
            <select id="mic-select">
              <option value="">Default microphone</option>
            </select>
          </label>
        </div>
        <div class="actions">
          <button id="connect-btn" type="button">Start Stream</button>
          <button id="stop-btn" type="button">Stop</button>
          <button id="refresh-mics-btn" type="button">Refresh Mics</button>
        </div>
        <p id="status-line" class="status">Idle.</p>
        <pre id="log-box">controller-bridge: ready</pre>
      </div>
    </main>
    <script src="/static/js/remote-controller-bridge.js?v=20260422k"></script>
  </body>
</html>
