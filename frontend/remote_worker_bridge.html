<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SST Remote Worker Bridge</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #09111d;
        --panel: #121d31;
        --line: #243453;
        --text: #e8eefc;
        --muted: #9caed2;
        --ok: #55dca4;
        --warn: #f1c56a;
        --bad: #ef7373;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: radial-gradient(circle at top, #193155 0%, var(--bg) 60%);
        color: var(--text);
        font-family: "Segoe UI", Tahoma, sans-serif;
      }
      main {
        max-width: 960px;
        margin: 24px auto;
        padding: 0 16px 24px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      label {
        display: grid;
        gap: 6px;
      }
      input {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: #0d1528;
      }
      .actions {
        margin-top: 12px;
        display: flex;
        gap: 10px;
      }
      button {
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: #1a2745;
        cursor: pointer;
      }
      pre {
        margin: 12px 0 0;
        min-height: 220px;
        max-height: 340px;
        overflow: auto;
        white-space: pre-wrap;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
        background: #0a1122;
        color: #ccd8f7;
      }
      .status {
        margin-top: 10px;
        color: var(--muted);
      }
      .ok {
        color: var(--ok);
      }
      .warn {
        color: var(--warn);
      }
      .bad {
        color: var(--bad);
      }
      audio {
        margin-top: 10px;
        width: 100%;
      }
      @media (max-width: 860px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="panel">
        <h1>Remote Worker Bridge</h1>
        <p class="status">
          Receives remote WebRTC audio and forwards PCM to local worker runtime over WebSocket ingest.
        </p>
        <div class="grid">
          <label>
            <span>Session ID</span>
            <input id="session-id" placeholder="sst-..." />
          </label>
          <label>
            <span>Pair Code</span>
            <input id="pair-code" placeholder="6 digits" />
          </label>
        </div>
        <div class="actions">
          <button id="connect-btn" type="button">Start Bridge</button>
          <button id="stop-btn" type="button">Stop</button>
        </div>
        <p id="status-line" class="status">Idle.</p>
        <audio id="monitor-audio" controls autoplay></audio>
        <pre id="log-box">worker-bridge: ready</pre>
      </div>
    </main>
    <script src="/static/js/remote-worker-bridge.js?v=20260422j"></script>
  </body>
</html>
